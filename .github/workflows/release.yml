name: Release

on:
  push:
    tags: ["*-v*.*.*"]

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify tag points to main HEAD
        run: |
          git fetch origin main
          main_head="$(git rev-parse origin/main)"
          if [ "${GITHUB_SHA}" != "${main_head}" ]; then
            echo "::error::Release tag must point to origin/main HEAD (${main_head}), got ${GITHUB_SHA}. Merge to main, pull, then tag the latest commit."
            exit 1
          fi

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Parse tag
        id: tag
        run: |
          tag="${GITHUB_REF_NAME}"
          plugin="${tag%-v*}"
          version="${tag#${plugin}-v}"
          echo "plugin=$plugin" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build JAR
        run: ./gradlew ":${{ steps.tag.outputs.plugin }}:bukkit:jar" --no-daemon

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: "${{ steps.tag.outputs.plugin }} v${{ steps.tag.outputs.version }}"
          files: |
            ${{ steps.tag.outputs.plugin }}/bukkit/build/libs/*.jar
          generate_release_notes: true
