name: Release

on:
  push:
    tags: ["*-v*.*.*"]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Verify tag points to main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "::error::Release tag must point to a commit on origin/main."
            echo "::error::Merge to main first, then tag from an up-to-date main checkout."
            exit 1
          fi

      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3

      - name: Parse tag
        id: tag
        run: |
          tag="${GITHUB_REF_NAME}"
          plugin="${tag%-v*}"
          version="${tag#${plugin}-v}"
          echo "plugin=$plugin" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build JAR
        run: ./gradlew ":${{ steps.tag.outputs.plugin }}:bukkit:jar" --no-daemon

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: "${{ steps.tag.outputs.plugin }} v${{ steps.tag.outputs.version }}"
          files: |
            ${{ steps.tag.outputs.plugin }}/bukkit/build/libs/*.jar
          generate_release_notes: true
